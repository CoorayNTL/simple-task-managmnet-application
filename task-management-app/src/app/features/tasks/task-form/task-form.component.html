<div class="form-container">
  <div class="form-header">
    <h2>{{ isEditing ? 'Edit Task' : 'New Task' }}</h2>
    <p>{{ isEditing ? 'Update the task details below.' : 'Fill in the details to create a task.' }}</p>
  </div>

  <form (ngSubmit)="onSubmit()" #taskForm="ngForm">
    <div class="form-group">
      <label for="title">Title <span class="required">*</span></label>
      <input
        id="title"
        type="text"
        [(ngModel)]="model.title"
        name="title"
        placeholder="Enter task title"
        maxlength="200"
        required
      />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea
        id="description"
        [(ngModel)]="model.description"
        name="description"
        placeholder="Optional description..."
        rows="4"
        maxlength="2000"
      ></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority" [(ngModel)]="model.priority" name="priority">
          <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dueDate">Due Date</label>
        <input
          id="dueDate"
          type="date"
          [(ngModel)]="model.dueDate"
          name="dueDate"
        />
      </div>
    </div>

    <div class="form-group form-group--checkbox" *ngIf="isEditing">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="model.isCompleted" name="isCompleted" />
        <span>Mark as completed</span>
      </label>
    </div>

    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="onCancel()" [disabled]="saving">
        Cancel
      </button>
      <button type="submit" class="btn-save" [disabled]="saving">
        {{ saving ? 'Saving...' : (isEditing ? 'Update Task' : 'Create Task') }}
      </button>
    </div>
  </form>
</div>
